version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      - api
    networks:
      - quill-network

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JUSTCALL_SECRET=test-secret
    networks:
      - quill-network

  render:
    build:
      context: .
      dockerfile: workers/render/Dockerfile
    environment:
      - NODE_ENV=production
    networks:
      - quill-network

networks:
  quill-network:
    driver: bridge
